name: Deploy web page

on:
  push: 
    branches:
      - master

env:
  DOCUMENT_BRANCH: "gh-pages"

jobs:
  build:
    name: Setup
    runs-on: ubuntu-24.04
    permissions:
      actions: write
      checks: write
      contents: write
    steps:
      - name: Set current datetime as env variable
        env:
          TZ: 'Asia/Tokyo' # Set timezone
        run: echo "CURRENT_DATETIME=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV

      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set git-configs
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git config push.default current
      
      - name: Switch branch
        run: | # ブランチが無い場合は新規作成し、ある場合は切り替える
          git switch $DOCUMENT_BRANCH 2>/dev/null || git switch --orphan $DOCUMENT_BRANCH
      
      - name: Copy files
        run: |
          git checkout master -- web
          git checkout master -- bossa-web
          git checkout master -- .gitmodules
          git checkout master -- package.json package-lock.json

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.14.0'

      - name: Run setup
        run: |
          npm i
          npm run init-bossa-web
          npm run build-bossa-web
          npm run copy-modules
        
      - name: Commit an push
        run: |
          git add web
          git commit -m "$CURRENT_DATETIME"
          git push